service timestamps log datetime msec
service timestamps debug datetime msec
service password-encryption
!
hostname Router
!
enable password 7 0822455D0A16
!
interface GigabitEthernet0/0
 description Conexion a Router2 - Area 10
 ip address 10.0.0.5 255.255.255.252
 duplex auto
 speed auto
!
interface GigabitEthernet0/1
 description Conexion a LAN - 192.168.2.0/24
 ip address 192.168.2.1 255.255.255.0
 duplex auto
 speed auto
!
interface GigabitEthernet0/2
 description Conexion a LAN - 192.168.1.0/24
 ip address 192.168.1.1 255.255.255.0
 duplex auto
 speed auto
!
interface Vlan1
 no ip address
 shutdown
!
router ospf 10
 log-adjacency-changes
 network 192.168.1.0 0.0.0.255 area 10
 network 192.168.2.0 0.0.0.255 area 10
 network 10.0.0.4 0.0.0.3 area 10
